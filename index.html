<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông báo thay đổi tên miền</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #6e7dff, #00c6ff);
        }

        /* HEADER */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            z-index: 999;
        }

        .header img {
            width: 28px;
            height: 28px;
        }

        /* CONTAINER */
        .container {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 90%;
            margin: 90px auto 20px;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 10px;
            color: #333;
        }

        .update-date {
            font-size: 13px;
            color: #888;
            margin-bottom: 15px;
        }

        p {
            font-size: 16px;
            margin-bottom: 15px;
            color: #555;
            line-height: 1.5;
        }

        a {
            word-break: break-all;
        }

        /* BUTTON */
        .cta-button {
            background-color: #4CAF50;
            color: white;
            padding: 12px;
            font-size: 16px;
            border-radius: 6px;
            text-decoration: none;
            display: block;
            width: 100%;
            margin-top: 10px;
        }

        .cta-button:hover {
            background-color: #45a049;
        }

        .countdown {
            font-size: 22px;
            font-weight: bold;
            color: #ff4d4d;
            margin-top: 15px;
        }

        .recommendation {
            background-color: #f1c40f;
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
            color: #333;
            font-weight: bold;
        }

        .download-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            color: #333;
            text-decoration: none;
            background-color: #4CAF50;
            padding: 10px;
            border-radius: 6px;
        }

        footer {
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }

        /* ===== RESPONSIVE BREAKPOINT ===== */
        @media (min-width: 768px) {
            .container {
                padding: 40px;
            }

            h1 {
                font-size: 32px;
            }

            .cta-button {
                display: inline-block;
                width: auto;
                padding: 12px 30px;
            }

            .download-btn {
                display: inline-flex;
                padding: 10px 20px;
            }
        }
    </style>
</head>

<body>

<div class="header">
    <img src="https://subjav.github.io/icon.png" alt="logo">
    SUBJAV
</div>

<div class="container">
    <h1>Thông báo thay đổi tên miền</h1>
    <p class="update-date" id="updateDate"></p>

    <p>
        Tên miền đã được cập nhật thành <strong>SUBJAV.CO</strong>.
    </p>

    <p>
        Truy cập ngay:
        <br>
        <strong><a href="https://subjav.co/">https://subjav.co/</a></strong>
    </p>

    <a href="https://subjav.co/" class="cta-button">Truy cập ngay</a>

    <div class="countdown" id="countdown"></div>

    <div class="recommendation">
       <p>Nếu bạn không thể truy cập (lúc web bị chặn), hãy bật ứng dụng 1.1.1.1 để đổi DNS:</p>

        <a href="https://1.1.1.1" target="_blank" class="download-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                <path d="M.5 9.9v3.6c0 .6.4 1 1 1h13c.6 0 1-.4 1-1V9.9h-1.5v3.1h-12V9.9H.5z"/>
                <path d="M7.646 11.354a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 9.793V1.5a.5.5 0 0 0-1 0v8.293L5.354 7.646a.5.5 0 1 0-.708.708l3 3z"/>
            </svg>
            Tải 1.1.1.1
        </a>
    </div>

    <footer>
        © 2026 SUBJAV
    </footer>
</div>

<script>
    const today = new Date();
    document.getElementById("updateDate").innerText =
        "Cập nhật: " + today.toLocaleDateString('vi-VN');

    var countdownDate = new Date().getTime() + 10000;
    var el = document.getElementById("countdown");

    setInterval(function() {
        var now = new Date().getTime();
        var seconds = Math.floor((countdownDate - now) / 1000);
        el.innerHTML = "Chuyển hướng sau: " + seconds + " giây";

        if (seconds <= 0) {
            window.location.href = "https://subjav.co";
        }
    }, 1000);
</script>

</body>
</html>
