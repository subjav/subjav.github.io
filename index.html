<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thông báo thay đổi tên miền</title>
<style>
    /* ===== GLOBAL ===== */
    :root {
        --bg-light: #f9f9f9;
        --bg-dark: #1e1e1e;
        --text-light: #333;
        --text-dark: #f0f0f0;
        --primary: #4CAF50;
        --secondary: #f1c40f;
        --accent: #ff4d4d;
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg-light);
        color: var(--text-light);
        transition: background-color 0.3s, color 0.3s;
    }

    body.dark-mode {
        background-color: var(--bg-dark);
        color: var(--text-dark);
    }

    /* ===== HEADER ===== */
    .header {
        position: fixed;
        top: 0;
        width: 100%;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        backdrop-filter: blur(10px);
        background: rgba(0,0,0,0.2);
        color: white;
        z-index: 999;
    }

    .header img {
        width: 32px;
        height: 32px;
    }

    .dark-toggle {
        background: var(--primary);
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
    }

    .dark-toggle:hover {
        background: #45a049;
    }

    /* ===== POPUP ===== */
    .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 998;
    }

    .popup {
        background-color: var(--bg-light);
        color: var(--text-light);
        padding: 30px 25px;
        border-radius: 12px;
        max-width: 450px;
        width: 90%;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        position: relative;
        transition: background-color 0.3s, color 0.3s;
    }

    body.dark-mode .popup {
        background-color: #2b2b2b;
        color: var(--text-dark);
    }

    .popup h1 {
        font-size: clamp(20px, 5vw, 28px);
        margin-bottom: 10px;
    }

    .popup p {
        font-size: clamp(14px, 4vw, 16px);
        margin-bottom: 20px;
        line-height: 1.6;
    }

    .cta-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        background-color: var(--primary);
        color: white;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 16px;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
    }

    .cta-button:hover {
        background-color: #45a049;
    }

    .countdown {
        margin-top: 20px;
        font-size: 22px;
        font-weight: bold;
        color: var(--accent);
    }

    .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid var(--primary);
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        display: inline-block;
        margin-right: 8px;
        vertical-align: middle;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    footer {
        margin-top: 20px;
        font-size: 12px;
        color: #888;
    }

    footer a {
        color: var(--primary);
        text-decoration: none;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
        .popup {
            padding: 20px 15px;
        }
        .cta-button {
            width: 100%;
        }
    }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div style="display:flex;align-items:center;gap:8px;">
        <img src="https://subjav.github.io/icon.png" alt="logo"> SUBJAV
    </div>
    <button class="dark-toggle" id="darkToggle">Dark Mode</button>
</div>

<!-- POPUP -->
<div class="overlay" id="overlay">
    <div class="popup">
        <h1>Thông báo thay đổi tên miền</h1>
        <p>Cập nhật lần cuối: <span id="updateDate"></span></p>
        <p>Tên miền mới của chúng tôi là <strong>SUBJAV.CO</strong>. Hãy truy cập ngay:</p>
        <a href="https://subjav.co/" class="cta-button">
            <span class="spinner"></span> Truy cập ngay
        </a>
        <div class="countdown" id="countdown"></div>
        <footer>
            © 2026 SUBJAV. <a href="https://subjav.co/privacy" target="_blank">Chính sách bảo mật</a>
        </footer>
    </div>
</div>

<script>
    // Cập nhật ngày
    const today = new Date();
    const formattedDate = today.toLocaleDateString('vi-VN');
    document.getElementById("updateDate").innerText = formattedDate;

    // Countdown & redirect
    let countdownTime = 10;
    const countdownEl = document.getElementById("countdown");
    const countdownInterval = setInterval(() => {
        countdownEl.innerHTML = `Chuyển hướng sau: ${countdownTime} giây`;
        countdownTime--;
        if(countdownTime < 0){
            clearInterval(countdownInterval);
            window.location.href = "https://subjav.co";
        }
    }, 1000);

    // Dark Mode Toggle
    const toggleBtn = document.getElementById("darkToggle");
    toggleBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        toggleBtn.textContent = document.body.classList.contains('dark-mode') ? "Light Mode" : "Dark Mode";
    });
</script>

</body>
</html>
