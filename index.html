<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thông báo thay đổi tên miền</title>
<style>
    :root {
        --bg-light: #f9f9f9;
        --bg-dark: #1e1e1e;
        --text-light: #333;
        --text-dark: #f0f0f0;
        --primary: #4CAF50;
        --secondary: #f1c40f;
        --accent: #ff4d4d;
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #6e7dff, #00c6ff);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        color: var(--text-light);
        transition: background-color 0.3s, color 0.3s;
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    body.dark-mode {
        background: #121212;
        color: var(--text-dark);
    }

    /* ===== HEADER ===== */
    .header {
        position: fixed;
        top: 0;
        width: 100%;
        padding: 10px 20px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        backdrop-filter: blur(10px);
        background: rgba(0,0,0,0.2);
        color: white;
        z-index: 999;
        gap: 8px;
    }

    .header img { width: 32px; height: 32px; }

    .dark-toggle {
        background: var(--primary);
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        transition: 0.3s;
        flex-shrink: 0;
        white-space: nowrap;
    }

    .dark-toggle:hover { background: #45a049; }

    /* ===== POPUP ===== */
    .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 998;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.5s;
    }

    .overlay.show { opacity: 1; pointer-events: all; }

    .popup {
        background-color: var(--bg-light);
        color: var(--text-light);
        padding: 30px 25px;
        border-radius: 12px;
        max-width: 450px;
        width: 90%;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        position: relative;
        transform: translateY(-50px);
        transition: transform 0.5s, background-color 0.3s, color 0.3s;
        opacity: 0;
    }

    .overlay.show .popup { transform: translateY(0); opacity: 1; }
    body.dark-mode .popup { background-color: #2b2b2b; color: var(--text-dark); }

    .popup h1 { font-size: clamp(20px, 5vw, 28px); margin-bottom: 10px; }
    .popup p { font-size: clamp(14px, 4vw, 16px); margin-bottom: 20px; line-height: 1.6; }

    .cta-button, .download-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 16px;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
        margin: 8px 0;
        white-space: nowrap;
        width: 100%;
        box-sizing: border-box;
    }

    .cta-button { background-color: var(--primary); color: white; }
    .cta-button:hover { background-color: #45a049; }

    .download-btn { background-color: var(--secondary); color: #333; }
    .download-btn:hover { background-color: #d4ac0d; }

    .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid var(--primary);
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
        display: inline-block;
        margin-right: 8px;
        vertical-align: middle;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .countdown { margin-top: 20px; font-size: 22px; font-weight: bold; color: var(--accent); }

    footer { margin-top: 20px; font-size: 12px; color: #888; }
    footer a { color: var(--primary); text-decoration: none; }

    @media (max-width: 480px) {
        .popup { padding: 20px 15px; }
        .cta-button, .download-btn { width: 100%; justify-content: center; white-space: normal; }
        .cta-button span.spinner { margin-right: 6px; }
        .dark-toggle { padding: 4px 8px; font-size: 14px; }
    }
</style>
</head>
<body>

<div class="header">
    <div style="display:flex;align-items:center;gap:8px;">
        <img src="https://subjav.github.io/icon.png" alt="logo"> SUBJAV
    </div>
  
</div>

<div class="overlay show" id="overlay">
    <div class="popup">
        <h1>Thông báo thay đổi tên miền</h1>
        <p>Cập nhật lần cuối: <span id="updateDate"></span></p>
      <p>Tên miền mới của chúng tôi là 
  <strong style="color: #8B0000;">SUBJAV.UNO</strong>. 
  Hãy truy cập ngay:
</p>

        <a href="https://subjav.uno/" class="cta-button">
            <span class="spinner"></span> Truy cập ngay
        </a>
        <a href="https://1.1.1.1" target="_blank" class="download-btn">
            Tải ứng dụng 1.1.1.1
        </a>

        <div class="countdown" id="countdown"></div>

        <footer>
            © 2026 SUBJAV. <a href="https://subjav.uno/privacy" target="_blank">Chính sách bảo mật</a>
        </footer>
    </div>
</div>

<script>
    const today = new Date();
    document.getElementById("updateDate").innerText = today.toLocaleDateString('vi-VN');

    let countdownTime = 10;
    const countdownEl = document.getElementById("countdown");
    const countdownInterval = setInterval(() => {
        countdownEl.innerHTML = `Chuyển hướng sau: ${countdownTime} giây`;
        countdownTime--;
        if(countdownTime < 0){
            clearInterval(countdownInterval);
            window.location.href = "https://subjav.uno";
        }
    }, 1000);

    const toggleBtn = document.getElementById("darkToggle");
    toggleBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        toggleBtn.textContent = document.body.classList.contains('dark-mode') ? "Light Mode" : "Dark Mode";
    });
</script>

</body>
</html>
